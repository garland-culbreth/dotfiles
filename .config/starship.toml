# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"

format = """
[Ôöî ](surface0)\
$all$fill $cmd_duration$time
[ÔööÔöÇ](surface0)$character\
"""

# Inserts a blank line between shell prompts
add_newline = true

# Specify palette used for color names
palette = "ayu_mirage"

[palettes.ayu_mirage]
cyan = "#5CCFE6"
yellow = "#FFD173"
blue = "#73D0FF"
green = "#D5FF80"
teal = "#95E6CB"
red = "#F28779"
orange = "#FFAD66"
purple = "#DFBFFF"
text = "#CCCAC2"
subtext = "#6B7A8B"
surface0 = "#4A505A"

[fill]
symbol = "-"
style = "surface0"

[line_break]
disabled = true

[time]
disabled = false

[character]
success_symbol = "[ÔØ»](bold fg:green)"
error_symbol = "[ÔØ»](bold fg:red)"
vimcmd_symbol = "[ÔØ«](bold fg:yellow)"
vimcmd_visual_symbol = "[ÔØ«](bold fg:blue)"
vimcmd_replace_symbol = "[ÔØ«](bold fg:purple)"
vimcmd_replace_one_symbol = "[ÔØ«](bold fg:purple)"

[username]
style_user = "bold fg:yellow"
style_root = "bold fg:red"

[hostname]
style = "bold fg:blue"
ssh_symbol = "¯¼ü "

[directory]
